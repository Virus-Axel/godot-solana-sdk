name: cpp-tests

# Story 1-5 Task 6 — wires the `scons tests` target (introduced by Task 4)
# into CI on Linux + macOS. Ground-truth validation for the C++ test tier
# (A-8 flipped in Task 4). Production `scons addon` is covered by build.yml;
# this job exercises only the host-only test binary and is independent of
# addon matrix combinatorics — single job per OS, fast feedback.

on:
  pull_request:
  push:
    branches:
      - master
      - feature/mwa-android

jobs:
  cpp-tests:
    name: "Story 1-5 scons tests (${{ matrix.os }})"
    # Hung-test insurance. 6 TEST_F cases at ~ms each; 20 min is >10x the
    # realistic ceiling including install + scons build.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Recursive required: godot-cpp submodule (provides godot::
          # types + static library) AND third_party/googletest (added
          # Task 4 Phase B, v1.14.0 at SHA f8d7d77c) both need init.
          submodules: recursive

      # Pairs with ci/grep_bans.sh pattern 7 (mwa-testing-define) which
      # catches `#define MWA_TESTING` at source level; THIS check covers
      # the SConstruct vector that pattern 7 doesn't scan. Two sub-checks:
      #   (1) exactly 1 MWA_TESTING reference in SConstruct
      #   (2) that reference is at the `tests_env.Append(CPPDEFINES=[...])`
      #       line at the conventional indentation (inside the `if "tests"
      #       in COMMAND_LINE_TARGETS:` alias block)
      # Any drift — second activation, wrong env variable, unindented (=
      # moved outside the alias block), alternative spelling — fails the
      # check. Runs before build so a detected leak aborts before producing
      # contaminated artifacts.
      - name: Enforce MWA_TESTING isolation (SConstruct scope)
        run: |
          set -e
          total=$(grep -c 'MWA_TESTING' SConstruct || true)
          if [ "$total" -ne 1 ]; then
            echo "::error::Expected exactly 1 MWA_TESTING reference in SConstruct, got $total"
            grep -n 'MWA_TESTING' SConstruct || true
            exit 1
          fi
          if ! grep -qE '^        tests_env\.Append\(CPPDEFINES=\["MWA_TESTING"\]\)$' SConstruct; then
            echo "::error::MWA_TESTING activation not at the expected tests_env.Append line (refactor moved it, changed env variable, or adjusted indentation?)"
            grep -n 'MWA_TESTING' SConstruct || true
            exit 1
          fi
          echo "MWA_TESTING isolation: clean (exactly 1 activation at tests_env.Append inside tests alias)"

      # scons is not preinstalled on either ubuntu-latest or macos-latest
      # GitHub runner images as of 2026-04-22. Install from the platform's
      # native package manager — vastly simpler than pip-in-venv. Single
      # source of version truth. Versions are unpinned — if specific scons
      # behavior becomes load-bearing, pin via `pip install scons==X.Y.Z
      # --break-system-packages`.
      - name: Install scons (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y scons

      - name: Install scons (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install scons

      - name: Verify scons version
        run: scons --version | head -3

      # Build the test binary. `scons tests` triggers the demand-build alias
      # added at SConstruct:545 (Task 4 Phase C). env.Clone() isolation
      # prevents contamination of the default addon build env.
      - name: Build ./bin/mwa_tests
        run: scons tests

      # Run the tests. EXPECTED output (as of Task 5 landing): ~6 TEST_F
      # cases — 2 SecretString tests from Task 4b + 4 MobileWalletAdapter
      # tests from Task 5. First green CI run should eyeball the actual
      # count against this expectation; a mismatch implies a missed TEST,
      # a fixture-registration issue, or an accidental DISABLED_ prefix.
      # Exit 0 = all tests pass.
      #
      # --gtest_color=yes keeps CI log highlighting consistent with
      # interactive runs.
      - name: Run ./bin/mwa_tests
        run: ./bin/mwa_tests --gtest_color=yes
