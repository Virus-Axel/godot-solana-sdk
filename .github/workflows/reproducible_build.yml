name: 🪞 Reproducible Build (AC-6 dual-runner)
# Story 4-3 T6 — DD-4-3-5 LOCKED: builds the plugin release AAR on TWO
# independent ubuntu-latest runners with FRESH Gradle caches (no warm
# build cache, no parallel task graph reuse), canonicalizes each AAR via
# tools/canonicalize-aar.sh (zeros mtimes + stable file ordering + zip -X),
# and asserts byte-identical SHA256 across the two runners.
#
# Three deviations from spec wording (per DD-4-3-5 + Story 4-3 §Anticipated
# Deviations D-4-3-2):
#   1. ubuntu-latest (NOT macos-latest) — established CI baseline per
#      Story 2-1 round-3 D-F4/D-F5 (instrumented_tests.yml comment block).
#      macos-latest costs 10x and brings no determinism gain because the
#      determinism floor is set by the canonicalize-aar.sh + cache-disable
#      flags, not the OS.
#   2. org.gradle.caching=false + org.gradle.parallel=false — widens the
#      determinism floor by removing warm-cache + reordered-task-graph as
#      sources of non-deterministic timestamps.
#   3. AAR canonicalization step — Gradle 8.x AAR output embeds
#      META-INF/MANIFEST.MF Build-Jdk + per-entry lastModifiedTime in the
#      central directory; canonicalize-aar.sh re-zips with mtimes zeroed
#      and entries sorted, stripping the non-deterministic surface.

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.runner }} — :plugin:assembleRelease + canonicalize SHA256
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Two parallel build jobs. Each must produce the same canonicalized
        # AAR SHA256 — the assert-equal job downstream diffs them.
        runner: [1, 2]
    env:
      # DD-4-3-5 #2 — disable Gradle build cache + parallelism via GRADLE_OPTS
      # JVM args. The `org.gradle.*` namespace cannot be set via the standard
      # `ORG_GRADLE_PROJECT_<name>` env-var convention because the dots in
      # the property name conflict with the convention's underscore parsing;
      # GRADLE_OPTS with -D is the documented escape hatch.
      GRADLE_OPTS: '-Dorg.gradle.caching=false -Dorg.gradle.parallel=false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # NB: intentionally NOT using gradle/actions/setup-gradle@v3 (which
      # warms the build cache from a Gradle-actions-managed store). DD-4-3-5
      # requires fresh-cache builds; the gradlew wrapper inside android/
      # provides the Gradle binary, no setup action needed.

      - name: Assemble release AAR with build cache disabled + dependencies refreshed
        run: |
          cd android
          # --no-build-cache forces every task to recompute outputs.
          # --refresh-dependencies forces module-metadata + lockfile re-resolution.
          # -Dorg.gradle.caching=false + -Dorg.gradle.parallel=false belt-and-suspenders
          # the env vars above (env is JVM-arg-style, -D is system-property style;
          # AGP/Gradle reads both for these properties).
          ./gradlew :plugin:assembleRelease \
            --no-build-cache \
            --refresh-dependencies \
            -Dorg.gradle.caching=false \
            -Dorg.gradle.parallel=false \
            --info --stacktrace

      - name: Canonicalize AAR + emit SHA256
        run: |
          AAR="$GITHUB_WORKSPACE/android/plugin/build/outputs/aar/WalletAdapterAndroid-release.aar"
          if [ ! -f "$AAR" ]; then
            echo "::error::release AAR not found at $AAR"
            exit 1
          fi
          chmod +x "$GITHUB_WORKSPACE/tools/canonicalize-aar.sh"
          SHA=$("$GITHUB_WORKSPACE/tools/canonicalize-aar.sh" "$AAR")
          echo "Canonicalized AAR SHA256: $SHA"
          echo "$SHA" > "$GITHUB_WORKSPACE/sha-${{ matrix.runner }}.txt"

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.runner }}
          path: sha-${{ matrix.runner }}.txt

  assert-equal:
    name: assert SHA256(build-1) == SHA256(build-2)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Download build-1 SHA
        uses: actions/download-artifact@v4
        with:
          name: sha-1
          path: sha-1/

      - name: Download build-2 SHA
        uses: actions/download-artifact@v4
        with:
          name: sha-2
          path: sha-2/

      - name: Diff SHA256s
        run: |
          SHA1=$(cat sha-1/sha-1.txt)
          SHA2=$(cat sha-2/sha-2.txt)
          echo "build-1 SHA256: $SHA1"
          echo "build-2 SHA256: $SHA2"
          if [ "$SHA1" != "$SHA2" ]; then
            echo "::error::AC-6 FAILED — canonicalized AAR SHA256 differs across runners. build-1=$SHA1 build-2=$SHA2. Investigate non-deterministic surface (likely a new META-INF entry, or canonicalize-aar.sh missed a non-deterministic field — see CR-60)."
            exit 1
          fi
          echo "✓ AC-6 — canonicalized AAR SHA256 byte-identical across both ubuntu-latest runners ($SHA1)"
