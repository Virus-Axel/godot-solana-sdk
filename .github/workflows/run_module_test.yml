name: Run Module Test
on:
  workflow_call:
    inputs:
      example_path:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v2

      - name: Set up SCons
        shell: bash
        run: |
          python -c "import sys; print(sys.version)"
          python -m pip install scons==4.8

      - uses: chickensoft-games/setup-godot@v1
        name: 🤖 Setup Godot
        with:
          version: 4.6.2-stable
          use-dotnet: false
          include-templates: true

      - name: Download Addon
        uses: actions/download-artifact@v4
        with:
          name: addons
          path: ./addons

      - name: Prepare project 
        shell: bash
        run: |
          cd ${{inputs.example_path}}
          ln -s ../../addons
          godot --headless --import --path .

      - name: Cache Solana tools
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/share/solana/install/active_release/bin
          key: solana-tools

      - name: Setup Solana tools
        run: |
          if [ ! -d "/home/runner/.local/share/solana/install/active_release/bin" ]; then
            curl --proto '=https' --tlsv1.2 -sSfL https://solana-install.solana.workers.dev | bash
          fi
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Get cache key of test directories
        id: testdircache
        run: echo "sha=$(git ls-files ${{ inputs.example_path }} | sort | xargs md5sum | md5sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache Test Accounts
        uses: actions/cache@v4
        with:
          path: test_accounts/
          key: test-accounts-${{ inputs.example_path }}-${{ steps.testdircache.outputs.sha }}

      - name: Load Test Accounts
        id: test_accounts
        run: |
          cd ${{inputs.example_path}}
          if [ -d "test_accounts" ]; then
          for file in "test_accounts"/*; do
          if [ -f "$file" ]; then
          str="${str} --account `echo -n "${file##*/}" | cut -f 1 -d '.' | tr -d $'\n'` ${{inputs.example_path}}${file}"
          fi
          done
          fi
          mkdir -p test_accounts
          
          if [ ! -f "test_accounts/CMV3.so" ]; then
          solana program dump --url mainnet-beta CndyV3LdqHUfDLmE5naZjVN8rBZz4tqhdefbAnjHG3JR test_accounts/CMV3.so
          str="${str} --bpf-program CndyV3LdqHUfDLmE5naZjVN8rBZz4tqhdefbAnjHG3JR ${{inputs.example_path}}test_accounts/CMV3.so"
          fi
          
          if [ ! -f "test_accounts/MPMD.so" ]; then
          solana program dump --url mainnet-beta metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s test_accounts/MPMD.so
          str="${str} --bpf-program metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s ${{inputs.example_path}}test_accounts/MPMD.so"
          fi
          
          if [ ! -f "test_accounts/MPCG.so" ]; then
          solana program dump --url mainnet-beta Guard1JwRhJkVH6XZhzoYxeBVQe872VH6QggF4BWmS9g test_accounts/MPCG.so
          str="${str} --bpf-program Guard1JwRhJkVH6XZhzoYxeBVQe872VH6QggF4BWmS9g ${{inputs.example_path}}test_accounts/MPCG.so"
          fi
          
          if [ ! -f "test_accounts/mpl_core_program.so" ]; then
          solana program dump --url mainnet-beta CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d test_accounts/mpl_core_program.so
          str="${str} --bpf-program CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d ${{inputs.example_path}}test_accounts/mpl_core_program.so"
          fi
          
          if [ ! -f "test_accounts/candy_machine_core.so" ]; then
          solana program dump --url mainnet-beta CMACYFENjoBMHzapRXyo1JZkVS6EtaDDzkjMrmQLvr4J test_accounts/candy_machine_core.so
          str="${str} --bpf-program CMACYFENjoBMHzapRXyo1JZkVS6EtaDDzkjMrmQLvr4J ${{inputs.example_path}}test_accounts/candy_machine_core.so"
          fi
          
          if [ ! -f "test_accounts/candy_guard.so" ]; then
          solana program dump --url mainnet-beta CMAGAKJ67e9hRZgfC5SFTbZH8MgEmtqazKXjmkaJjWTJ test_accounts/candy_guard.so
          str="${str} --bpf-program CMAGAKJ67e9hRZgfC5SFTbZH8MgEmtqazKXjmkaJjWTJ ${{inputs.example_path}}test_accounts/candy_guard.so"
          fi
          
          echo "VALIDATOR_ARGS=${str}" >> "$GITHUB_OUTPUT"

      - name: Setup Local Validator
        run: |
          nohup solana-test-validator --reset --quiet ${{ steps.test_accounts.outputs.VALIDATOR_ARGS }} &
          sleep 10

      - name: (Android) Install emulator dependencies
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse0 \
            libgl1 \
            libglu1-mesa \
            mesa-utils \
            libxcursor1 \
            libxinerama1 \
            libxrandr2 \
            libxi6 \
            qemu-kvm

      - name: (Android) Setup Android SDK
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools emulator system-images;android-30;default;x86_64'

      - name: (Android) Install Maestro CLI
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          cd ${{inputs.example_path}}
          wget https://github.com/mobile-dev-inc/Maestro/releases/download/cli-2.0.10/maestro.zip
          sha256sum maestro.zip | grep 'dbdcfbe2b673e1a6f40c65664f1ed5becad0b0a40e35d0e203dff511d05032f6  maestro.zip'
          unzip maestro.zip
          chmod +x maestro/bin/maestro

      - name: (Android) Create AVD
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          cd ${{inputs.example_path}}
          echo "no" | avdmanager create avd -n test -k "system-images;android-30;default;x86_64" --force

      - name: (Android) Fetch fake wallet apk
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          cd ${{inputs.example_path}}
          wget https://github.com/solana-mobile/mobile-wallet-adapter/releases/download/v2.1.0/fakewallet-v1-debug.apk
          md5sum fakewallet-v1-debug.apk | grep '4543d34ee895898335287ef7c4bf3ddf  fakewallet-v1-debug.apk'

      - name: (Android) Enable KVM group perms
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

      - name: (Android) Export project to Android
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          export ANDROID_AVD_HOME="/home/runner/.config/.android/avd"
          cd ${{inputs.example_path}}
          $ANDROID_HOME/emulator/emulator -avd test -no-audio -no-window -no-boot-anim -no-snapshot -gpu swiftshader_indirect -accel auto -skip-adb-auth &
          mkdir tmp
          godot --headless --path . --export-debug Android tmp/app.apk --install-android-build-template
          adb wait-for-device
          adb install fakewallet-v1-debug.apk
          adb install tmp/app.apk
          export MAESTRO_CLI_NO_ANALYTICS=1
          maestro/bin/maestro test flow.yaml

      - name: (Android) Verify logs
        if: ${{ endsWith(inputs.example_path, 'Android/') }}
        run: |
          adb logcat -d | grep -q 'ALL TESTS PASSED'

      - name: (Android) Export ADB logs
        if: failure() && endsWith(inputs.example_path, 'Android/')
        run: |
          adb logcat -d > /home/runner/.maestro/tests/adb_log.txt

      - name: (Android) Upload maestro logs
        if: failure() && endsWith(inputs.example_path, 'Android/')
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-logs
          path: |
            /home/runner/.maestro/tests/

      - name: (Web) Download Puppeteer
        if: ${{ endsWith(inputs.example_path, 'Web/') }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: (Web) Setup Puppeteer
        if: ${{ endsWith(inputs.example_path, 'Web/') }}
        run: |
          cd .github/workflows/puppeteer
          npm init -y
          npm install puppeteer

      - name: (Web) Export project to web
        if: ${{ endsWith(inputs.example_path, 'Web/') }}
        run: |
          cd ${{inputs.example_path}}
          mkdir tmp
          godot --headless --path . --export-debug Web tmp/tmp_js_export.html

      - name: (Web) Download wallet mock
        if: ${{ endsWith(inputs.example_path, 'Web/') }}
        uses: actions/checkout@v4
        with:
          repository: 'Virus-Axel/solana-wallet-mock'
          path: 'solana-wallet-mock'

      - name: (Web) Test project in browser
        if: ${{ endsWith(inputs.example_path, 'Web/') }}
        run: |
          python3 .github/workflows/puppeteer/serve.py --no-browser --root `pwd`/${{inputs.example_path}}tmp &
          cd .github/workflows/puppeteer
          output=$(node puppeteer.js)
          echo "$output"
          echo "$output" | grep -q 'ALL TESTS PASSED'
          exit $?

      - name: Test project
        if: ${{ !endsWith(inputs.example_path, 'Web/') && !endsWith(inputs.example_path, 'Android/') }}
        shell: bash
        run: |
          cd ${{inputs.example_path}}
          godot --headless --path . --quit-after 200000 --log-file log.txt || true
          cat log.txt | grep 'ALL TESTS PASSED'
      
      - name: Upload Logs on Failure
        if: ${{ failure() && !endsWith(inputs.example_path, 'Web/') && !endsWith(inputs.example_path, 'Android/') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            ${{inputs.example_path}}/log.txt
