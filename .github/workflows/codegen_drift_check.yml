name: Codegen Drift Check
on:
  push:
    branches: [master, feature/mwa-android]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Error-codes codegen drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-dev.txt

      - name: Install codegen dependencies
        run: pip install -r tools/requirements-dev.txt

      - name: Regenerate artifacts
        run: python tools/gen_error_codes.py

      - name: Check for drift
        run: |
          status=$(git status --porcelain -- \
            src/generated/ \
            android/plugin/src/generated/ \
            addons/SolanaSDK/mwa_error_codes.gd)
          if [ -n "$status" ]; then
            echo "Drift detected:"
            echo "$status"
            git diff -- \
              src/generated/ \
              android/plugin/src/generated/ \
              addons/SolanaSDK/mwa_error_codes.gd
            exit 1
          fi
