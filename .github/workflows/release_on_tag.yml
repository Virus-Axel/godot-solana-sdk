name: release-on-tag

# AC-9 (Story 5-6 plan.md AC-9, NEW per A-17 / CR-5-4-F MANDATED):
# release-on-tag CI that produces multi-platform native libraries + AAR
# + GDScript + docs as `addons-bundle.zip`, then publishes a GitHub
# Release tied to the git tag with the bundle attached.
#
# Per CR-5-4-F reclassified-to-MANDATED (was deferred per CR-5-4-G HIGH):
# local release-cutting is INFEASIBLE under current source-tree state
# (godot-cpp API drift breaks `scons addon`'s C++ compile path on the
# local dev machine — see CR-5-4-G HIGH). This workflow IS the only
# viable release path: GitHub Actions multi-platform builders may pin
# different godot-cpp commits / different toolchain versions and
# therefore may NOT hit the same compile blocker. T14 documents the
# CR-5-4-G triage path (Q2=(b) document-as-CI-only-constraint default).
#
# Per DD-5-6-2 LOCKED:
#   - Release matrix = same 7 release-only targets that build.yml covers
#     today (linux-release + windows-release + android-release-arm64 +
#     android-release-x86_64 + web-release + macos-release + ios-release).
#   - AAR built separately via `./gradlew :plugin:assembleRelease`.
#   - Bundle layout: addons/SolanaSDK/{bin,WalletAdapterAndroid,mwa,...}/
#     mimicking SConstruct:497-528 Copy actions; ZIP'd as addons-bundle.zip.
#   - tools/canonicalize-aar.sh (Story 4-3 T6) applied to the AAR for
#     byte-diff parity with reproducible_build.yml.
#   - LICENSE byte-diff (A-18) NOT folded here per Q3=(a) — see standalone
#     byte_diff_license.yml. Release-cut PRs run BOTH gates anyway via
#     the standard pull_request trigger flow before tagging.
#
# Per Q4=(c) LOCKED at story-creation HALT 2026-04-30:
# this workflow handles ANY tag matching `v*.*.*` or `v*.*.*-rc*`.
# Production-bound `v0.1.0` release tag is per user direction post-5-6;
# this workflow will fire when the user pushes the tag. Synthetic
# `v0.0.1-test*` tags are EXCLUDED from publishing so workflow can be
# verified end-to-end without a public release leaking.
#
# Trigger:
#   - `push: tags: ['v*.*.*', 'v*.*.*-rc*']` — matches v0.1.0,
#     v0.1.0-rc1, v1.2.3-rc4, etc. Excludes v0.0.1-test*.
#   - `workflow_dispatch` — manual trigger (no release published; useful
#     for verifying the build-only path).

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts but do NOT publish a GitHub Release (default true for workflow_dispatch)'
        required: false
        type: boolean
        default: true

jobs:
  # ===========================================================================
  # Job 1 — multi-platform native build (mirrors build.yml release-only matrix)
  # ===========================================================================
  build-native:
    name: native · ${{ matrix.identifier }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.ref_name, 'v0.0.1-test')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - identifier: linux-release
            runner: ubuntu-latest
            target: template_release
            platform: linux
            arch: x86_64
            threads: True
          - identifier: windows-release
            runner: ubuntu-latest
            target: template_release
            platform: windows
            arch: x86_64
            threads: True
          - identifier: android-release-arm64
            runner: ubuntu-latest
            target: template_release
            platform: android
            arch: arm64
            threads: True
          - identifier: android-release-x86_64
            runner: ubuntu-latest
            target: template_release
            platform: android
            arch: x86_64
            threads: True
          - identifier: web-release
            runner: ubuntu-latest
            target: template_release
            platform: web
            arch: wasm32
            threads: True
          - identifier: macos-release
            runner: macos-latest
            target: template_release
            platform: macos
            arch: universal
            threads: True
          - identifier: ios-release
            runner: macos-latest
            target: template_release
            platform: ios
            arch: arm64
            threads: True
    steps:
      - name: (Windows) Install mingw64
        if: ${{ startsWith(matrix.identifier, 'windows-') }}
        run: |
          sudo apt-get install -y mingw-w64
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: (Android) Set up Java 21
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: (Android) Set up Android SDK
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        uses: android-actions/setup-android@v2

      - name: (Android) Install Android Tools
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        run: |
          "$ANDROID_SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "build-tools;30.0.3" "platforms;android-29" "cmdline-tools;latest" "cmake;3.10.2.4988404" "ndk;23.2.8568313"

      - name: (Web) Install emsdk toolchain
        if: ${{ startsWith(matrix.identifier, 'web-') }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.20

      - name: (Web) Install node
        if: ${{ startsWith(matrix.identifier, 'web-') }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up SCons
        run: |
          python -m pip install scons==4.8

      - name: Checkout project (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get godot-cpp commit SHA
        id: godotcpp
        run: echo "sha=$(git -C godot-cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache godot-cpp bindings
        uses: actions/cache@v4
        with:
          path: .godot/
          key: godot-cpp-release-${{ matrix.identifier }}-${{ steps.godotcpp.outputs.sha }}

      - name: Compile extension
        run: |
          scons threads='${{ matrix.threads }}' target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' -j2
          cp godot-solana-sdk.gdextension bin/
          ls -l bin/

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.identifier }}
          path: |
            ${{ github.workspace }}/bin/

  # ===========================================================================
  # Job 2 — Android plugin AAR build
  # ===========================================================================
  build-aar:
    name: AAR · :plugin:assembleRelease
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.ref_name, 'v0.0.1-test')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble release AAR (R8 minify on, per CR-7)
        run: |
          cd android
          ./gradlew :plugin:assembleRelease --info --stacktrace

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aar-release
          path: android/plugin/build/outputs/aar/WalletAdapterAndroid-release.aar

  # ===========================================================================
  # Job 3 — Bundle the addons/ tree and publish the GitHub Release
  # ===========================================================================
  bundle-and-publish:
    name: Bundle + publish · ${{ github.ref_name }}
    needs:
      - build-native
      - build-aar
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write    # gh release create
    steps:
      - name: Checkout project (provides repo metadata + GDScript + docs)
        uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: /tmp/native-artifacts
          merge-multiple: true

      - name: Download AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: aar-release
          path: /tmp/aar

      - name: Stage addons/SolanaSDK/ tree
        run: |
          set -euo pipefail
          mkdir -p addons/SolanaSDK/bin addons/SolanaSDK/WalletAdapterAndroid
          # Native libs from per-platform artifacts (already-merged into one dir
          # via merge-multiple: true above).
          if [ -d /tmp/native-artifacts ]; then
            cp -R /tmp/native-artifacts/* addons/SolanaSDK/bin/ || true
          fi
          # AAR for the Android plugin (canonicalized for reproducibility).
          if [ -f /tmp/aar/WalletAdapterAndroid-release.aar ]; then
            bash tools/canonicalize-aar.sh /tmp/aar/WalletAdapterAndroid-release.aar
            cp /tmp/aar/WalletAdapterAndroid-release.aar addons/SolanaSDK/WalletAdapterAndroid/
          fi
          echo "Staged addon tree:"
          find addons/SolanaSDK -type f | sort | head -50

      - name: Verify LICENSE byte-diff (AC-10 / A-18; pre-publish guard)
        run: bash tools/check_license_diff.sh

      - name: Create addons-bundle.zip
        run: |
          set -euo pipefail
          cd addons
          zip -r ../addons-bundle.zip SolanaSDK/
          cd ..
          ls -l addons-bundle.zip
          echo "Bundle size: $(du -h addons-bundle.zip | cut -f1)"

      - name: Publish GitHub Release
        if: |
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          !startsWith(github.ref_name, 'v0.0.1-test')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES=$(cat <<EOF
          ## ${{ github.ref_name }}

          Multi-platform addon bundle for the godot-mwa-android SDK
          (linux + windows + macos + android arm64/x86_64 + web wasm32
          + ios arm64). Includes the Android plugin AAR
          (\`WalletAdapterAndroid-release.aar\`, R8-minified per CR-7,
          canonicalized per Story 4-3 T6) and the GDScript facade.

          **Install (per FR-1):** download \`addons-bundle.zip\`, extract
          into your Godot 4.3.x project's \`addons/\` directory, enable
          the SolanaSDK plugin in Project Settings → Plugins.

          See [REVIEW.md](https://github.com/${{ github.repository }}/blob/master/REVIEW.md)
          for the reviewer recipe + linked example app at
          \`ValentinVPK/godot-mwa-example\` (per A-17).

          ---
          Built by .github/workflows/release_on_tag.yml at commit
          \`${{ github.sha }}\` per AC-9 / A-17 / CR-5-4-F MANDATED.
          EOF
          )
          gh release create "${{ github.ref_name }}" \
            addons-bundle.zip \
            --title "${{ github.ref_name }}" \
            --notes "$NOTES"

      - name: Synthetic-tag verification (no publish)
        if: |
          startsWith(github.ref_name, 'v0.0.1-test') ||
          github.event_name == 'workflow_dispatch'
        run: |
          echo "::notice::Synthetic / dry-run mode — addons-bundle.zip built but NOT published."
          echo "Bundle path: $(realpath addons-bundle.zip)"
          ls -l addons-bundle.zip
          echo "::notice::To publish, push a real release tag (e.g. v0.1.0 or v0.1.0-rc1)."

      - name: Upload bundle as workflow artifact (always — for triage)
        uses: actions/upload-artifact@v4
        with:
          name: addons-bundle-${{ github.ref_name }}
          path: addons-bundle.zip
          retention-days: 30
