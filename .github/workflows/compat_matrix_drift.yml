name: compat-matrix-drift

# AC-8 (Story 5-6 plan.md:468): CI validates docs/compatibility-matrix.md;
# fails the build if `compileSdk`, `targetSdk`, `minSdk`, the clientlib-ktx
# version, the Android Gradle Plugin version, or the Godot minor pin
# (`compatibility_minimum` in godot-solana-sdk.gdextension) drifts from
# the matrix values.
#
# Per DD-5-6-8 LOCKED:
#   - Implementation: Python helper at scripts/check_compat_matrix.py
#     parses the markdown table at docs/compatibility-matrix.md "Pinned
#     values" section, then for each enforced row reads the live value
#     from the source-of-truth file and compares.
#   - On drift: prints `::error file=<src>::` GitHub Actions annotations
#     naming the row + expected + actual; exits 1 (PR-blocking).
#   - Standalone workflow (DD-5-6-1 consistency): keeps new gates in
#     their own files for line-item visibility.
#
# Time budget per arch §10.4: <30 sec wallclock (pure Python file reads).

on:
  pull_request:
  push:
    branches:
      - master
      - feature/mwa-android

jobs:
  compat-matrix-drift:
    name: "AC-8 compat-matrix drift check (compileSdk / minSdk / clientlib-ktx / AGP / Godot minor)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies (for the helper's pytest cases)
        run: pip install -r tools/requirements-dev.txt

      - name: Self-test the helper (scripts/test_check_compat_matrix.py)
        run: pytest scripts/test_check_compat_matrix.py -v

      - name: Run drift check against production matrix
        run: python scripts/check_compat_matrix.py --repo-root "${GITHUB_WORKSPACE}"
