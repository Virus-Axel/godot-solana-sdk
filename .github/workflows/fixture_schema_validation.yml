name: Fixture Schema Validation
on:
  push:
    branches: [master, feature/mwa-android]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-fixtures:
    name: Validate testdata/mwa-fixtures schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-dev.txt

      - name: Install validator dependencies
        run: pip install -r tools/requirements-dev.txt

      - name: Validate canonical fixture set
        run: python tools/validate_fixtures.py testdata/mwa-fixtures/
