name: 📱 Instrumented Tests (AC-1/3/4/5/6/7/8)
# Story 2-1 T9 — on-emulator Android instrumentation tests.
#
# Story 5-6 T3 (D-5-6-T3-1 Rule 1): the R8 release-AAR smoke job
# (A-10 — verifies @UsedByGodot method names survive R8 minification +
# AC-5 release-variant authorize E2E) was MOVED OUT of this workflow into
# the standalone .github/workflows/r8_release_smoke.yml for AC-2 wording
# compliance ("r8_release_smoke.yml (new)" line-item per plan.md:462).
# Job body extracted verbatim — no behavioral change. See r8_release_smoke.yml.
#
# Route B (D-T9-1 Rule 2): no Fake Wallet APK install step. Tests inject
# FakeMwaClient via @VisibleForTesting plugin ctor — same pattern as the
# T4 unit tests, but on real device with real EncryptedSharedPreferences
# + real Keystore. What this buys us: AC-1 plaintext scan has teeth
# (real AES256_GCM), AC-8 recursive scan covers the real app data dir,
# AC-7 fingerprint idempotence exercises the Keystore-backed salt across
# calls. What this does NOT cover: clientlib-ktx ↔ real wallet intent
# resolution (tracked as a Story 4-x hardening follow-up).
on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  instrumented:
    name: API 33 emulator · :plugin:connectedAndroidTest
    # D-F5 (Story 2-1 T10 second fixup): ubuntu-latest + x86_64 KVM, NOT
    # macos-latest + arm64. The prior macos-latest run failed with
    # `HVF error: HV_UNSUPPORTED` / `qemu-system-aarch64-headless: failed
    # to initialize HVF: Invalid argument` — GitHub's hosted Apple Silicon
    # macOS runners do not expose Hypervisor.framework to the emulator, so
    # arm64 QEMU can't hardware-accelerate. Before that, the initial
    # macos-latest + x86_64 config hit the reverse problem (Apple Silicon
    # has no HAXM for x86 emulation).
    #
    # The stable pattern across the existing CI (run_examples.yml,
    # run_module_test.yml) is ubuntu-latest with /dev/kvm exposed — larger
    # GitHub-hosted ubuntu runners provide nested virtualization. Mirror
    # that pattern here.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api33-google-x86_64-v3

      - name: Run androidTest on API 33 emulator (x86_64 + KVM)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android
          script: |
            ./gradlew :plugin:connectedDebugAndroidTest --info --stacktrace

      - name: Upload androidTest reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-reports
          path: |
            android/plugin/build/reports/androidTests/**
            android/plugin/build/outputs/androidTest-results/**

