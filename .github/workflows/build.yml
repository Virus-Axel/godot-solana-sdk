name: 🛠️ Builds
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - identifier: linux-debug
            name: Linux Debug
            runner: ubuntu-latest
            target: template_debug
            platform: linux
            arch: x86_64
            threads: True
          - identifier: linux-release
            name: Linux Release
            runner: ubuntu-latest
            target: template_release
            platform: linux
            arch: x86_64
            threads: True
          - identifier: windows-debug
            name: Windows Debug
            runner: windows-latest
            target: template_debug
            platform: windows
            arch: x86_64
            threads: True
          - identifier: windows-release
            name: Windows Release
            runner: windows-latest
            target: template_release
            platform: windows
            arch: x86_64
            threads: True
          - identifier: android-debug-arm64
            name: Android Debug arm64
            runner: ubuntu-latest
            target: template_debug
            platform: android
            arch: arm64
            threads: True
          - identifier: android-release-arm64
            name: Android Release arm64
            runner: ubuntu-latest
            target: template_release
            platform: android
            arch: arm64
            threads: True
          - identifier: android-debug-x86_64
            name: Android Debug x86_64
            runner: ubuntu-latest
            target: template_debug
            platform: android
            arch: x86_64
            threads: True
          - identifier: android-release-x86_64
            name: Android Release x86_64
            runner: ubuntu-latest
            target: template_release
            platform: android
            arch: x86_64
            threads: True
          - identifier: web-debug-nothreads
            name: Web Debug (Single Thread)
            runner: ubuntu-latest
            target: template_debug
            platform: web
            arch: wasm32
            threads: False
          - identifier: web-release-nothreads
            name: Web Release (Single Thread)
            runner: ubuntu-latest
            target: template_release
            platform: web
            arch: wasm32
            threads: False
          - identifier: web-debug
            name: Web Debug
            runner: ubuntu-latest
            target: template_debug
            platform: web
            arch: wasm32
            threads: True
          - identifier: web-release
            name: Web Release
            runner: ubuntu-latest
            target: template_release
            platform: web
            arch: wasm32
            threads: True
          - identifier: macos-debug
            runner: macos-latest
            name: 🍎 macOS (universal) Debug
            target: template_debug
            platform: macos
            arch: universal
            threads: True
          - identifier: macos-release
            runner: macos-latest
            name: 🍎 macOS (universal) Release
            target: template_release
            platform: macos
            arch: universal
            threads: True
          - identifier: ios-debug
            runner: macos-latest
            name: 🍎 IOS Debug
            target: template_debug
            platform: ios
            arch: arm64
            threads: True
          - identifier: ios-release
            runner: macos-latest
            name: 🍎 IOS Release
            target: template_release
            platform: ios
            arch: arm64
            threads: True
    steps:

      - name: (Windows) Install mingw64
        if: ${{ startsWith(matrix.identifier, 'windows-') }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: (Android) Set up Java 21
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        uses: actions/setup-java@v4
        with:  
          distribution: 'zulu'
          java-version: 21

      - name: (Android) Set up Android SDK
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        uses: android-actions/setup-android@v2

      - name: (Android) Install Android Tools
        if: ${{ startsWith(matrix.identifier, 'android-') }}
        shell: sh
        run: |
          "$ANDROID_SDK_ROOT"/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "build-tools;30.0.3" "platforms;android-29" "cmdline-tools;latest" "cmake;3.10.2.4988404" "ndk;23.2.8568313"


      - name: (Web) Install emsdk toolchain
        if: ${{ startsWith(matrix.identifier, 'web-') }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: (Web) Install node
        if: ${{ startsWith(matrix.identifier, 'web-') }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: (Web) Update npm
        if: ${{ startsWith(matrix.identifier, 'web-') }}
        run: |
          npm install -g npm@11

      - name: Set up Python
        uses: actions/setup-python@v2

      - name: Set up SCons
        shell: bash
        run: |
          python -c "import sys; print(sys.version)"
          python -m pip install scons==4.8

      - name: Set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0

      - name: (Linux) Set up Clang for cargo
        if: ${{ startsWith(matrix.identifier, 'linux-') }}
        shell: bash
        run: |
          sudo apt install clang libclang-dev

      - name: (Windows) Install Rust Windows target
        if: ${{ startsWith(matrix.identifier, 'windows-') }}
        run: |
          rustup target add x86_64-pc-windows-gnu
          vcpkg install openssl:x64-windows
          echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64" >> $GITHUB_ENV

      - name: (Mac) Install clang for cargo
        if: ${{ startsWith(matrix.identifier, 'macos-') }}
        shell: sh
        run: |
          brew install llvm
          echo "LLVM_CONFIG_PATH=$(brew --prefix llvm)/bin/llvm-config" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Checkout project
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Get godot-cpp commit SHA
        id: godotcpp
        run: echo "sha=$(git -C godot-cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache godot-cpp bindings
        uses: actions/cache@v4
        with:
          path: .godot/
          key: godot-cpp-${{ matrix.identifier }}-${{ steps.godotcpp.outputs.sha }}

      - name: Install OpenSSL (vcpkg)
        if: ${{ startsWith(matrix.identifier, 'windows-') }}
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install openssl:x64-windows
          echo "OPENSSL_DIR=$PWD\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$PWD\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$PWD\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV

      - name: Setup upterm session
        if: ${{ startsWith(matrix.identifier, 'windows-') }}
        shell: sh
        run: |
          OPENSSL_NO_VENDOR=1 cargo build --manifest-path validator_bridge/Cargo.toml
          ls validator_bridge/target

      - name: Compile extension
        shell: sh
        run: |
          EXTRA_ARGS=""

          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS use_mingw=yes"
          fi

          OPENSSL_NO_VENDOR=1 scons threads='${{ matrix.threads }}' target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' $EXTRA_ARGS
          cp godot-solana-sdk.gdextension bin/
          ls -l */bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.identifier }}
          path: |
            ${{ github.workspace }}/bin/

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: ${{ github.event.repository.name }}
          pattern: ${{ github.event.repository.name }}-*
          delete-merged: true

  package:
    runs-on: ubuntu-latest
    needs: merge
    steps:

    - name: Checkout project
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.repository.name }}
        path: ./bin

    - name: Set up Python
      uses: actions/setup-python@v2

    - name: Set up SCons
      shell: bash
      run: |
        python -c "import sys; print(sys.version)"
        python -m pip install scons==4.8

    - name: Package Solanakit
      shell: sh
      run: |
        scons WalletAdapterAndroid
        scons assemble
      
    - name: Upload SolanaKit
      uses: actions/upload-artifact@v4
      with:
        name: addons
        path: |
          ${{ github.workspace }}/addons
