name: byte-diff-license

# AC-10 (Story 5-6 plan.md AC-10, NEW per A-18): PR-blocking gate that
# asserts repo-root LICENSE body byte-matches the OSI canonical MIT template
# (modulo the copyright-holder line). Invokes tools/check_license_diff.sh
# (shipped Story 5-5 T7 commit 768ae68a; embeds OSI canonical MIT body
# inline so CI does NOT depend on network access).
#
# Per DD-5-6-1 LOCKED (Q3=(a) standalone, resolved 2026-04-30 HALT):
# this workflow lives standalone rather than folded into release_on_tag.yml
# so the LICENSE byte-match is verified on EVERY PR (catches accidental
# whitespace edits / spurious additions at PR-time, not at release-cut time).
# Mirrors the grep_bans.yml pattern (fast standalone gate + single
# responsibility + line-item visibility in GitHub Actions UI).
#
# Time budget per arch §10.4: <30 sec wallclock (single bash invocation).

on:
  pull_request:
  push:
    branches:
      - master
      - feature/mwa-android

jobs:
  byte-diff-license:
    name: "AC-10 / A-18 LICENSE byte-diff (OSI canonical MIT)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify LICENSE matches OSI canonical MIT template
        run: bash tools/check_license_diff.sh
