name: ci-slo-audit

# AC-4 (Story 5-6 plan.md:464): monthly cron that reports CI wall-clock SLO
# metrics (P95 < 35 min per arch §10.3.3 LOCKED) + T3 instrumented-tests
# flake / retry rate (< 2%).
#
# Per DD-5-6-3 LOCKED:
#   - Data source: GitHub API (`gh api repos/.../actions/runs`) — NOT a local
#     state.json cache. Avoids cross-workflow coupling; uses GitHub's
#     authoritative wallclock data.
#   - Output: markdown table comment posted to a tracking issue tagged
#     `ci-slo`. Per miniT6 = auto (locked at story-creation HALT 2026-04-30):
#     T6 AUTO-CREATES the tracking issue on first run if none exists with
#     the `ci-slo` label.
#   - Threshold annotation: ::warning:: emitted if P95 > 35 min OR T3 retry
#     rate > 2%.
#   - Trigger: monthly cron (1st of month 03:00 UTC) + workflow_dispatch
#     for manual / testing runs.
#
# Time budget: <2 min wallclock (one paginated `gh api` call + jq parsing).

on:
  schedule:
    # 1st of month 03:00 UTC.
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      window_runs:
        description: 'How many recent PR-event runs to sample (default 30 per AC-4)'
        required: false
        default: '30'
        type: string

jobs:
  ci-slo-audit:
    name: "AC-4 CI SLO audit (P95 wallclock + T3 retry rate)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write       # gh issue create / comment
      actions: read       # gh api repos/.../actions/runs
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOW: ${{ inputs.window_runs || '30' }}
      P95_BUDGET_MIN: '35'        # arch §10.3.3 LOCKED
      T3_FLAKE_BUDGET_PCT: '2'    # arch §10.3.3 LOCKED
      T3_WORKFLOW_NAME: '📱 Instrumented Tests (AC-1/3/4/5/6/7/8)'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch last N PR-event Actions runs
        id: fetch
        run: |
          set -euo pipefail
          # `gh api` paginates with --paginate; we cap at WINDOW results
          # via jq head-slice. event=pull_request narrows to PR-blocking
          # runs (excludes scheduled crons, manual dispatch).
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?event=pull_request&per_page=100" \
            --jq ".workflow_runs[0:${WINDOW}]" \
            > /tmp/runs.json
          COUNT=$(jq 'length' /tmp/runs.json)
          echo "Fetched ${COUNT} PR-event runs."
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Compute wallclock P95 + per-workflow stats
        id: metrics
        run: |
          set -euo pipefail
          # Per-run wallclock (seconds) = updated_at - created_at.
          # Group by workflow name; emit per-group min/max/median/P95 in seconds.
          jq -r '
            map({
              name: .name,
              status: .status,
              conclusion: .conclusion,
              wallclock_s: ((.updated_at | fromdate) - (.created_at | fromdate))
            })
          ' /tmp/runs.json > /tmp/runs_normalized.json

          # Overall P95 across all runs.
          OVERALL_P95_S=$(jq -r '
            [.[].wallclock_s] | sort | if length == 0 then 0 else .[((length - 1) * 0.95 | floor)] end
          ' /tmp/runs_normalized.json)
          OVERALL_P95_MIN=$(awk "BEGIN { printf \"%.1f\", ${OVERALL_P95_S} / 60 }")
          echo "Overall P95 wallclock (min): ${OVERALL_P95_MIN}"
          echo "overall_p95_min=${OVERALL_P95_MIN}" >> "$GITHUB_OUTPUT"

          # T3 retry rate: count `instrumented_tests.yml`-derived runs with
          # conclusion=failure that were followed (chronologically nearby) by
          # a success on the same workflow. Approximation: rate = failures /
          # total T3 runs in the window. Real retry tracking would need to
          # cross-correlate run.head_sha + run.attempt; for v0.1.0 the
          # simpler "T3 fail rate" is what we report.
          T3_TOTAL=$(jq --arg name "${T3_WORKFLOW_NAME}" \
            '[.[] | select(.name == $name)] | length' /tmp/runs_normalized.json)
          T3_FAIL=$(jq --arg name "${T3_WORKFLOW_NAME}" \
            '[.[] | select(.name == $name and .conclusion == "failure")] | length' \
            /tmp/runs_normalized.json)
          if [ "${T3_TOTAL}" -gt 0 ]; then
            T3_FAIL_PCT=$(awk "BEGIN { printf \"%.1f\", ${T3_FAIL} * 100.0 / ${T3_TOTAL} }")
          else
            T3_FAIL_PCT="0.0"
          fi
          echo "T3 instrumented runs in window: ${T3_TOTAL} (fail: ${T3_FAIL}; rate: ${T3_FAIL_PCT}%)"
          echo "t3_total=${T3_TOTAL}" >> "$GITHUB_OUTPUT"
          echo "t3_fail=${T3_FAIL}" >> "$GITHUB_OUTPUT"
          echo "t3_fail_pct=${T3_FAIL_PCT}" >> "$GITHUB_OUTPUT"

          # Per-workflow P95 table (rendered later for the issue comment).
          jq -r --arg t3 "${T3_WORKFLOW_NAME}" '
            group_by(.name) |
            map({
              name: .[0].name,
              count: length,
              p95_s: ([.[].wallclock_s] | sort | if length == 0 then 0 else .[((length - 1) * 0.95 | floor)] end)
            }) |
            sort_by(-.p95_s) |
            .[] |
            "| \(.name) | \(.count) | \(.p95_s | . / 60 | (100 * . | round / 100)) |"
          ' /tmp/runs_normalized.json > /tmp/per_workflow_p95.txt
          echo "Per-workflow P95 table written to /tmp/per_workflow_p95.txt"

      - name: "Emit ::warning:: annotations on SLO breach"
        if: always()
        run: |
          P95_MIN="${{ steps.metrics.outputs.overall_p95_min }}"
          T3_PCT="${{ steps.metrics.outputs.t3_fail_pct }}"
          # Numeric comparison via awk (bash floats unreliable).
          if awk "BEGIN { exit !(${P95_MIN} > ${P95_BUDGET_MIN}) }"; then
            echo "::warning::SLO breach — overall P95 wallclock ${P95_MIN} min > budget ${P95_BUDGET_MIN} min (arch §10.3.3 LOCKED)"
          fi
          if awk "BEGIN { exit !(${T3_PCT} > ${T3_FLAKE_BUDGET_PCT}) }"; then
            echo "::warning::SLO breach — T3 instrumented_tests fail rate ${T3_PCT}% > budget ${T3_FLAKE_BUDGET_PCT}% (arch §10.3.3 LOCKED)"
          fi

      - name: Find or create the `ci-slo` tracking issue (miniT6 = auto)
        id: tracking
        run: |
          set -euo pipefail
          # Look for an open issue with the `ci-slo` label.
          ISSUE_NUMBER=$(gh issue list \
            --label ci-slo \
            --state open \
            --json number \
            --jq '.[0].number // empty' \
            --limit 1)
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "No open ci-slo issue found; creating one (miniT6 = auto)."
            ISSUE_URL=$(gh issue create \
              --title "CI SLO tracking — monthly audit (AC-4)" \
              --label ci-slo \
              --body "Automated tracking issue for the AC-4 CI SLO monthly audit cron (.github/workflows/ci_slo_audit.yml). Each month a comment lands here with the wallclock P95 + T3 retry rate metrics. SLO budgets: P95 < 35 min, T3 fail rate < 2% (arch §10.3.3 LOCKED). Created automatically by miniT6 = auto (Story 5-6 T6, locked at story-creation HALT 2026-04-30).")
            ISSUE_NUMBER=$(basename "${ISSUE_URL}")
            echo "Created tracking issue #${ISSUE_NUMBER}: ${ISSUE_URL}"
          fi
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Post monthly metrics comment to tracking issue
        run: |
          set -euo pipefail
          P95_MIN="${{ steps.metrics.outputs.overall_p95_min }}"
          T3_TOTAL="${{ steps.metrics.outputs.t3_total }}"
          T3_FAIL="${{ steps.metrics.outputs.t3_fail }}"
          T3_PCT="${{ steps.metrics.outputs.t3_fail_pct }}"
          WINDOW_COUNT="${{ steps.fetch.outputs.count }}"
          ISSUE="${{ steps.tracking.outputs.issue_number }}"

          # Build SLO badges.
          P95_BADGE="🟢"
          if awk "BEGIN { exit !(${P95_MIN} > ${P95_BUDGET_MIN}) }"; then P95_BADGE="🔴"; fi
          T3_BADGE="🟢"
          if awk "BEGIN { exit !(${T3_PCT} > ${T3_FLAKE_BUDGET_PCT}) }"; then T3_BADGE="🔴"; fi

          {
            echo "## CI SLO audit — ${GITHUB_REF_NAME} @ $(date -u +%Y-%m-%d)"
            echo ""
            echo "_Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}_"
            echo ""
            echo "Sampled the last **${WINDOW_COUNT}** PR-event Actions runs."
            echo ""
            echo "### Headline metrics"
            echo ""
            echo "| Metric | Value | Budget | Status |"
            echo "|---|---|---|---|"
            echo "| Overall P95 wallclock | ${P95_MIN} min | ${P95_BUDGET_MIN} min | ${P95_BADGE} |"
            echo "| T3 instrumented_tests fail rate | ${T3_PCT}% (${T3_FAIL} of ${T3_TOTAL}) | ${T3_FLAKE_BUDGET_PCT}% | ${T3_BADGE} |"
            echo ""
            echo "### Per-workflow P95 (sorted descending)"
            echo ""
            echo "| Workflow | Runs | P95 (min) |"
            echo "|---|---|---|"
            cat /tmp/per_workflow_p95.txt
            echo ""
            echo "_Source: \`gh api repos/${GITHUB_REPOSITORY}/actions/runs?event=pull_request\` per DD-5-6-3 LOCKED. Budgets per arch §10.3.3 LOCKED._"
          } > /tmp/comment.md

          gh issue comment "${ISSUE}" --body-file /tmp/comment.md
          echo "Posted comment to issue #${ISSUE}."
