# flow.yaml
# clearState() now resets myResult, so every connect_wallet() reopens the
# OS picker.  The test needs enough AUTHORIZE taps for all connect + sign
# cycles (4 connects + 4 signs = ~8 authorizations).  Extra taps are
# harmless — extendedWaitUntil is optional.

appId: com.example.app
---
- launchApp
- extendedWaitUntil:
     visible: "AUTHORIZE"
     optional: true
     timeout: 240000
- tapOn:
    text: "AUTHORIZE"
    waitToSettleTimeoutMs: 50000
